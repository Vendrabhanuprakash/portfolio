{% load static %}
<section class="section section-alt" id="Contact">
    <div class="section-inner">
        <div class="section-header">
            <span class="section-label">Contact</span>
            <h2>Get In Touch</h2>
            <p>Have a project in mind or want to connect? I'd love to hear from you.</p>
        </div>
        <div class="contact-wrapper">
            <div class="contact-info">
                <h3>Let's talk</h3>
                <p>I'm open to internships, collaborations, and interesting project ideas. Drop me a message and I'll get back to you.</p>
                <div class="contact-detail">
                    <i class="fas fa-envelope"></i>
                    <span>vendrabhanu@email.com</span>
                </div>
                <div class="contact-detail">
                    <i class="fas fa-location-dot"></i>
                    <span>India</span>
                </div>
                <div class="contact-detail">
                    <i class="fas fa-graduation-cap"></i>
                    <span>AI &amp; ML Student</span>
                </div>
            </div>
            <div id="contact-container">
                <form>
                    <div class="contact-form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name" required>
                    </div>
                    <div class="contact-form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="contact-form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Tell me about your project or idea..." rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
